<style>
:root {
  --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dark: #8B6914;
  --noir: #0D0D0D; --charcoal: #1A1A1A; --stone: #2C2C2C;
  --cream: #F5F0E8; --muted: #9A9A8A; --green: #4CAF50;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--noir); color: var(--cream); font-family: var(--sans); font-weight: 300; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 4rem;
  background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
  border-bottom: 0.5px solid rgba(201,168,76,0.2);
}
.nav-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 600; letter-spacing: 0.15em; color: var(--gold); text-decoration: none; }
.nav-logo span { color: var(--cream); font-weight: 300; }
.nav-links { display: flex; gap: 2rem; }
.nav-links a { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--gold); }
.lang-selector { display: flex; gap: 0.4rem; }
.lang-btn { background: none; border: 0.5px solid rgba(201,168,76,0.3); color: var(--muted); font-size: 0.7rem; padding: 0.3rem 0.6rem; cursor: pointer; transition: all 0.2s; font-family: var(--sans); }
.lang-btn.active, .lang-btn:hover { background: var(--gold); color: var(--noir); border-color: var(--gold); }

/* ── HEADER ── */
.page-header { padding: 9rem 4rem 4rem; background: var(--charcoal); border-bottom: 0.5px solid rgba(201,168,76,0.15); }
.page-tag { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
.page-tag::before { content: ''; width: 40px; height: 0.5px; background: var(--gold); }
.page-title { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; margin-bottom: 2rem; }
.page-title em { font-style: italic; color: var(--gold); }
.header-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; }

/* ── FILTRES & TRI ── */
.filters { display: flex; gap: 0.7rem; flex-wrap: wrap; }
.filter-btn { background: none; border: 0.5px solid rgba(201,168,76,0.25); color: var(--muted); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.45rem 1rem; cursor: pointer; font-family: var(--sans); transition: all 0.2s; }
.filter-btn:hover { border-color: var(--gold); color: var(--cream); }
.filter-btn.active { background: var(--gold); color: var(--noir); border-color: var(--gold); }
.sort-select { background: var(--stone); border: 0.5px solid rgba(201,168,76,0.2); color: var(--cream); padding: 0.45rem 1rem; font-size: 0.72rem; font-family: var(--sans); cursor: pointer; outline: none; }
.sort-select option { background: var(--stone); }

/* ── STATS GLOBALES ── */
.global-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(201,168,76,0.1); border-bottom: 0.5px solid rgba(201,168,76,0.15); }
.gstat { background: var(--noir); padding: 1.8rem 2rem; text-align: center; }
.gstat-val { font-family: var(--serif); font-size: 2.2rem; font-weight: 300; color: var(--gold); }
.gstat-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; }

/* ── GRILLE BIENS ── */
.biens-section { padding: 3rem 4rem; }
.biens-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }

.bien-card { background: var(--charcoal); border: 0.5px solid rgba(201,168,76,0.12); transition: border-color 0.3s, transform 0.2s; overflow: hidden; }
.bien-card:hover { border-color: rgba(201,168,76,0.5); transform: translateY(-3px); }

/* Visuel bien */
.bien-visual {
  height: 220px; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.bien-bg { position: absolute; inset: 0; }
.bien-emoji { font-size: 4rem; opacity: 0.35; position: relative; z-index: 1; }
.bien-badges-overlay { position: absolute; top: 12px; left: 12px; z-index: 2; display: flex; flex-direction: column; gap: 0.4rem; }
.badge-overlay { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.3rem 0.7rem; font-weight: 500; }
.badge-dispo { background: var(--green); color: #fff; }
.badge-reserve { background: rgba(201,168,76,0.9); color: var(--noir); }
.badge-vendu { background: rgba(154,154,138,0.9); color: var(--noir); }
.valeur-badge { position: absolute; top: 12px; right: 12px; z-index: 2; background: rgba(13,13,13,0.85); border: 0.5px solid var(--green); padding: 0.4rem 0.8rem; }
.valeur-badge span { font-family: var(--serif); font-size: 1.1rem; color: var(--green); }
.valeur-badge small { font-size: 0.6rem; color: var(--muted); display: block; text-align: center; }

/* Infos bien */
.bien-info { padding: 1.5rem; }
.bien-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
.bien-title { font-family: var(--serif); font-size: 1.25rem; font-weight: 300; line-height: 1.2; }
.bien-pays { font-size: 1.2rem; }
.bien-location { font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; }

/* Prix timeline */
.prix-timeline { background: var(--stone); padding: 1rem; margin-bottom: 1rem; }
.prix-label { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7rem; }
.prix-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
.prix-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.prix-dot.avant { background: var(--muted); }
.prix-dot.travaux { background: var(--gold); }
.prix-dot.apres { background: var(--green); }
.prix-text { font-size: 0.8rem; flex: 1; }
.prix-val { font-family: var(--serif); font-size: 1rem; font-weight: 300; }
.prix-val.final { color: var(--green); font-size: 1.1rem; }

/* Progress bar valeur ajoutée */
.valeur-bar { margin-bottom: 1.2rem; }
.valeur-bar-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.4rem; }
.valeur-bar-label span:last-child { color: var(--green); font-weight: 500; }
.bar-track { height: 4px; background: var(--stone); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--green)); border-radius: 2px; transition: width 1s ease; }

/* Specs */
.bien-specs { display: flex; gap: 1.2rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
.spec { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--muted); }
.spec-icon { font-size: 0.85rem; }

/* Actions */
.bien-actions { display: flex; gap: 0.8rem; }
.btn-detail { flex: 1; background: none; border: 0.5px solid rgba(201,168,76,0.3); color: var(--gold); padding: 0.7rem; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: var(--sans); transition: all 0.2s; }
.btn-detail:hover { background: rgba(201,168,76,0.1); }
.btn-rdv { flex: 1; background: var(--gold); border: none; color: var(--noir); padding: 0.7rem; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: var(--sans); font-weight: 500; transition: background 0.2s; text-decoration: none; display: flex; align-items: center; justify-content: center; }
.btn-rdv:hover { background: var(--gold-light); }
.btn-rdv.disabled { background: var(--stone); color: var(--muted); cursor: not-allowed; pointer-events: none; }

/* ── MODAL DÉTAIL ── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.88); align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--charcoal); border: 0.5px solid rgba(201,168,76,0.3); width: 100%; max-width: 750px; max-height: 92vh; overflow-y: auto; }
.modal-header { padding: 1.5rem 2rem; border-bottom: 0.5px solid rgba(201,168,76,0.15); display: flex; justify-content: space-between; align-items: flex-start; }
.modal-title { font-family: var(--serif); font-size: 1.8rem; font-weight: 300; }
.modal-title em { color: var(--gold); font-style: italic; }
.close-modal { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; transition: color 0.2s; }
.close-modal:hover { color: var(--cream); }

.modal-visual { height: 280px; position: relative; display: flex; align-items: center; justify-content: center; }
.modal-visual .bien-emoji { font-size: 6rem; }

.modal-body { padding: 2rem; }

/* Historique valorisation */
.histo-section { margin-bottom: 2rem; }
.histo-title { font-family: var(--serif); font-size: 1.1rem; font-weight: 300; color: var(--cream); margin-bottom: 1.2rem; border-bottom: 0.5px solid rgba(201,168,76,0.15); padding-bottom: 0.8rem; }
.histo-timeline { position: relative; padding-left: 1.5rem; }
.histo-timeline::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 1px; background: rgba(201,168,76,0.2); }
.histo-item { position: relative; margin-bottom: 1.2rem; }
.histo-item::before { content: ''; position: absolute; left: -1.5rem; top: 6px; width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--gold); background: var(--charcoal); }
.histo-item.current::before { background: var(--green); border-color: var(--green); }
.histo-date { font-size: 0.68rem; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.2rem; }
.histo-event { font-size: 0.85rem; color: var(--cream); }
.histo-price { font-family: var(--serif); font-size: 1.1rem; color: var(--gold); margin-top: 0.2rem; }
.histo-price.green { color: var(--green); }
.histo-delta { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; margin-top: 0.2rem; }
.delta-up { color: var(--green); }

.modal-travaux { margin-bottom: 2rem; }
.travaux-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.8rem; }
.travaux-item { font-size: 0.75rem; color: var(--muted); padding: 0.5rem 0.8rem; border: 0.5px solid rgba(201,168,76,0.15); display: flex; align-items: center; gap: 0.5rem; }
.travaux-item::before { content: '✓'; color: var(--gold); font-size: 0.7rem; flex-shrink: 0; }

.modal-specs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
.mspec { background: var(--stone); padding: 1rem; text-align: center; }
.mspec-val { font-family: var(--serif); font-size: 1.4rem; font-weight: 300; color: var(--gold); }
.mspec-label { font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; }

.modal-rdv-btn { display: block; width: 100%; background: var(--gold); color: var(--noir); border: none; padding: 1rem; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; font-weight: 500; font-family: var(--sans); text-align: center; text-decoration: none; transition: background 0.2s; }
.modal-rdv-btn:hover { background: var(--gold-light); }

/* ── NO RESULTS ── */
.no-results { text-align: center; padding: 6rem; color: var(--muted); font-size: 0.9rem; }

@media (max-width: 900px) {
  nav { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
  .page-header { padding: 7rem 1.5rem 3rem; }
  .biens-section { padding: 2rem 1.5rem; }
  .biens-grid { grid-template-columns: 1fr; }
  .global-stats { grid-template-columns: 1fr 1fr; }
  .modal-specs-grid { grid-template-columns: 1fr 1fr; }
  .travaux-grid { grid-template-columns: 1fr; }
}
[dir="rtl"] .page-tag::before { display: none; }
[dir="rtl"] .page-tag::after { content:''; width:40px; height:0.5px; background:var(--gold); }
[dir="rtl"] .histo-timeline { padding-left: 0; padding-right: 1.5rem; }
[dir="rtl"] .histo-timeline::before { left: auto; right: 0; }
[dir="rtl"] .histo-item::before { left: auto; right: -1.5rem; }
</style>
</head>

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => { if(b.textContent.toLowerCase()===lang) b.classList.add('active'); });
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const t = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(t[key]) el.innerHTML = t[key];
  });
  renderBiens();
}

function applyFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBiens();
}

function getFiltered() {
  let list = BIENS.slice();
  if (currentFilter === 'dispo') list = list.filter(b => b.statut === 'dispo');
  else if (currentFilter === 'reserve') list = list.filter(b => b.statut === 'reserve');
  else if (currentFilter === 'DZ') list = list.filter(b => b.pays === 'DZ');
  else if (currentFilter === 'MA') list = list.filter(b => b.pays === 'MA');
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'prix_asc') list.sort((a,b) => a.prix_vente - b.prix_vente);
  else if (sort === 'prix_desc') list.sort((a,b) => b.prix_vente - a.prix_vente);
  else if (sort === 'valeur_desc') list.sort((a,b) => b.valeur_pct - a.valeur_pct);
  return list;
}

function fmtPrix(val, devise) {
  return val.toLocaleString('fr-FR') + ' ' + devise;
}

function renderBiens() {
  const t = i18n[currentLang];
  const list = getFiltered();
  const grid = document.getElementById('biensGrid');
  const noRes = document.getElementById('noResults');
  const nbDispo = BIENS.filter(b => b.statut === 'dispo').length;
  document.getElementById('stat_dispo').textContent = nbDispo;

  if (list.length === 0) { grid.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = list.map(b => {
    const titre = b[`titre_${currentLang}`];
    const loc = b[`location_${currentLang}`];
    const etage = b[`etage_${currentLang}`];
    const statutClass = b.statut === 'dispo' ? 'badge-dispo' : b.statut === 'reserve' ? 'badge-reserve' : 'badge-vendu';
    const statutLabel = b.statut === 'dispo' ? t.statut_dispo : b.statut === 'reserve' ? t.statut_reserve : t.statut_vendu;
    const barWidth = Math.min(b.valeur_pct * 1.2, 100);
    const rdvClass = b.statut !== 'dispo' ? 'disabled' : '';
    const rdvLabel = b.statut === 'dispo' ? t.btn_rdv : b.statut === 'reserve' ? t.btn_rdv_reserve : t.btn_rdv_vendu;
    const rdvHref = b.statut === 'dispo' ? `agenda.html?dir=2&bien=${b.id}` : '#';

    return `
    <div class="bien-card">
      <div class="bien-visual">
        <div class="bien-bg" style="background:${b.bg}"></div>
        <div class="bien-emoji">${b.emoji}</div>
        <div class="bien-badges-overlay">
          <span class="badge-overlay ${statutClass}">${statutLabel}</span>
        </div>
        <div class="valeur-badge">
          <span>+${b.valeur_pct}%</span>
          <small>${t.valeur_label}</small>
        </div>
      </div>
      <div class="bien-info">
        <div class="bien-top">
          <h3 class="bien-title">${titre}</h3>
          <span class="bien-pays">${b.pays === 'DZ' ? '🇩🇿' : '🇲🇦'}</span>
        </div>
        <p class="bien-location">📍 ${loc} · ${etage}</p>
        <div class="prix-timeline">
          <div class="prix-label">${t.lbl_prix_hist}</div>
          <div class="prix-row"><div class="prix-dot avant"></div><span class="prix-text" style="color:var(--muted)">Achat</span><span class="prix-val">${fmtPrix(b.prix_avant, b.devise)}</span></div>
          <div class="prix-row"><div class="prix-dot travaux"></div><span class="prix-text" style="color:var(--muted)">Travaux</span><span class="prix-val">+ ${fmtPrix(b.cout_travaux, b.devise)}</span></div>
          <div class="prix-row"><div class="prix-dot apres"></div><span class="prix-text" style="color:var(--cream);font-weight:500">${t.lbl_prix_vente}</span><span class="prix-val final">${fmtPrix(b.prix_vente, b.devise)}</span></div>
        </div>
        <div class="valeur-bar">
          <div class="valeur-bar-label"><span>${t.valeur_label}</span><span>+${b.valeur_pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${barWidth}%"></div></div>
        </div>
        <div class="bien-specs">
          <span class="spec"><span class="spec-icon">📐</span>${b.surface}</span>
          <span class="spec"><span class="spec-icon">🛏️</span>${b.chambres} ${t.lbl_chambres}</span>
          <span class="spec"><span class="spec-icon">🚿</span>${b.sdb} ${t.lbl_sdb}</span>
        </div>
        <div class="bien-actions">
          <button class="btn-detail" onclick="openModal(${b.id})">${t.btn_detail}</button>
          <a href="${rdvHref}" class="btn-rdv ${rdvClass}">${rdvLabel} ${b.statut==='dispo'?'→':''}</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id) {
  const b = BIENS.find(x => x.id === id);
  if (!b) return;
  const t = i18n[currentLang];
  const titre = b[`titre_${currentLang}`];
  const loc = b[`location_${currentLang}`];
  const desc = b[`desc_${currentLang}`];
  const etage = b[`etage_${currentLang}`];

  const histoHtml = b.historique.map(h => `
    <div class="histo-item${h.current?' current':''}">
      <div class="histo-date">${h[`date_${currentLang}`]}</div>
      <div class="histo-event">${h[`event_${currentLang}`]}</div>
      <div class="histo-price${h.current?' green':''}">${h.prix}</div>
      ${h.delta ? `<div class="histo-delta delta-up">▲ ${h.delta}</div>` : ''}
    </div>`).join('');

  const rdvHref = b.statut === 'dispo' ? `agenda.html?dir=2&bien=${b.id}` : '#';
  const rdvLabel = b.statut === 'dispo' ? t.btn_rdv : b.statut === 'reserve' ? t.btn_rdv_reserve : t.btn_rdv_vendu;

  document.getElementById('modalBox').innerHTML = `
    <div class="modal-header">
      <div>
        <h2 class="modal-title">${titre}</h2>
        <p style="font-size:0.8rem;color:var(--muted);margin-top:0.3rem">📍 ${loc} · ${etage}</p>
      </div>
      <button class="close-modal" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-visual" style="background:${b.bg}">
      <div class="bien-emoji" style="font-size:6rem;opacity:0.4">${b.emoji}</div>
      <div style="position:absolute;top:16px;right:16px;background:rgba(13,13,13,0.85);border:0.5px solid var(--green);padding:0.6rem 1rem;text-align:center">
        <div style="font-family:var(--serif);font-size:1.6rem;color:var(--green)">+${b.valeur_pct}%</div>
        <div style="font-size:0.62rem;color:var(--muted)">${t.valeur_label}</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-specs-grid">
        <div class="mspec"><div class="mspec-val">${b.surface}</div><div class="mspec-label">${t.lbl_surface}</div></div>
        <div class="mspec"><div class="mspec-val">${b.chambres}</div><div class="mspec-label">${t.lbl_chambres}</div></div>
        <div class="mspec"><div class="mspec-val">${fmtPrix(b.prix_vente, b.devise)}</div><div class="mspec-label">${t.lbl_prix_vente}</div></div>
      </div>
      <p style="font-size:0.88rem;color:var(--muted);line-height:1.8;margin-bottom:2rem">${desc}</p>
      <div class="histo-section">
        <div class="histo-title">${t.lbl_prix_hist}</div>
        <div class="histo-timeline">${histoHtml}</div>
      </div>
      <div class="modal-travaux" style="margin-bottom:2rem">
        <div class="histo-title">${t.lbl_travaux}</div>
        <div class="travaux-grid">${b.travaux.map(tr => `<div class="travaux-item">${tr}</div>`).join('')}</div>
      </div>
      ${b.statut === 'dispo' ? `<a href="${rdvHref}" class="modal-rdv-btn">${rdvLabel} →</a>` : `<div style="text-align:center;padding:1rem;font-size:0.8rem;color:var(--muted);border:0.5px solid rgba(201,168,76,0.15)">${rdvLabel}</div>`}
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

renderBiens();
</script>
</body>
</html>
