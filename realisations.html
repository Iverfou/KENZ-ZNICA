:root {
  --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dark: #8B6914;
  --noir: #0D0D0D; --charcoal: #1A1A1A; --stone: #2C2C2C;
  --cream: #F5F0E8; --muted: #9A9A8A;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--noir); color: var(--cream); font-family: var(--sans); font-weight: 300; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 4rem;
  background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
  border-bottom: 0.5px solid rgba(201,168,76,0.2);
}
.nav-logo { font-family: var(--serif); font-size: 1.4rem; font-weight: 600; letter-spacing: 0.15em; color: var(--gold); text-decoration: none; }
.nav-logo span { color: var(--cream); font-weight: 300; }
.nav-links { display: flex; gap: 2rem; }
.nav-links a { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--gold); }
.lang-selector { display: flex; gap: 0.4rem; }
.lang-btn { background: none; border: 0.5px solid rgba(201,168,76,0.3); color: var(--muted); font-size: 0.7rem; padding: 0.3rem 0.6rem; cursor: pointer; transition: all 0.2s; font-family: var(--sans); }
.lang-btn.active, .lang-btn:hover { background: var(--gold); color: var(--noir); border-color: var(--gold); }

.page-header { padding: 9rem 4rem 4rem; background: var(--charcoal); border-bottom: 0.5px solid rgba(201,168,76,0.15); }
.page-tag { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
.page-tag::before { content: ''; width: 40px; height: 0.5px; background: var(--gold); }
.page-title { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; margin-bottom: 2.5rem; }
.page-title em { font-style: italic; color: var(--gold); }

/* ── FILTRES ── */
.filters { display: flex; gap: 0.8rem; flex-wrap: wrap; }
.filter-btn {
  background: none; border: 0.5px solid rgba(201,168,76,0.25);
  color: var(--muted); font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 0.5rem 1.2rem; cursor: pointer;
  font-family: var(--sans); transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--gold); color: var(--cream); }
.filter-btn.active { background: var(--gold); color: var(--noir); border-color: var(--gold); }

/* ── GRILLE PROJETS ── */
.projects-section { padding: 4rem; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2rem; }

.project-card {
  border: 0.5px solid rgba(201,168,76,0.15); background: var(--charcoal);
  cursor: pointer; transition: border-color 0.3s, transform 0.2s;
  overflow: hidden;
}
.project-card:hover { border-color: var(--gold); transform: translateY(-2px); }

/* ── SLIDER AVANT/APRÈS ── */
.slider-wrap {
  position: relative; height: 260px; overflow: hidden; user-select: none;
}
.slider-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.img-before { z-index: 1; }
.img-after { z-index: 2; clip-path: inset(0 50% 0 0); transition: clip-path 0.05s; }

.slider-handle {
  position: absolute; top: 0; bottom: 0; z-index: 3;
  left: 50%; transform: translateX(-50%);
  width: 2px; background: var(--gold); cursor: ew-resize;
}
.slider-handle::before {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gold); border: 2px solid var(--noir);
  display: flex; align-items: center; justify-content: center;
}
.slider-handle::after {
  content: '◀ ▶';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.55rem; color: var(--noir); white-space: nowrap; z-index: 4;
  pointer-events: none;
}
.label-before, .label-after {
  position: absolute; bottom: 12px; z-index: 5;
  font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(13,13,13,0.75); color: var(--cream);
  padding: 0.3rem 0.7rem; pointer-events: none;
}
.label-before { left: 12px; }
.label-after { right: 12px; }

.project-info { padding: 1.5rem; }
.project-badges { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.badge {
  font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.25rem 0.6rem; border: 0.5px solid;
}
.badge.type-residentiel { border-color: rgba(201,168,76,0.4); color: var(--gold); }
.badge.type-commercial { border-color: rgba(100,180,140,0.4); color: #64B48C; }
.badge.type-artistique { border-color: rgba(180,100,160,0.4); color: #B464A0; }
.badge.pays { border-color: rgba(154,154,138,0.3); color: var(--muted); }

.project-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 300; margin-bottom: 0.4rem; }
.project-location { font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; }

.project-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1.2rem; }
.pstat { background: var(--stone); padding: 0.7rem; text-align: center; }
.pstat-val { font-family: var(--serif); font-size: 1.2rem; font-weight: 300; color: var(--gold); }
.pstat-label { font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }

.project-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.2rem; }
.project-cta {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gold); text-decoration: none; border-bottom: 0.5px solid rgba(201,168,76,0.3);
  padding-bottom: 2px; transition: gap 0.3s;
}
.project-cta:hover { gap: 1rem; }

/* ── MODAL DÉTAIL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
  padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--charcoal); border: 0.5px solid rgba(201,168,76,0.3);
  width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  padding: 1.5rem 2rem; border-bottom: 0.5px solid rgba(201,168,76,0.15);
  display: flex; justify-content: space-between; align-items: flex-start;
}
.modal-title { font-family: var(--serif); font-size: 1.8rem; font-weight: 300; }
.modal-title em { color: var(--gold); font-style: italic; }
.close-modal { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }
.close-modal:hover { color: var(--cream); }
.modal-slider-wrap { position: relative; height: 380px; overflow: hidden; user-select: none; }
.modal-body { padding: 2rem; }
.modal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
.modal-stat { background: var(--stone); padding: 1rem; text-align: center; }
.modal-stat-val { font-family: var(--serif); font-size: 1.6rem; font-weight: 300; color: var(--gold); }
.modal-stat-label { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; }
.modal-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.8; margin-bottom: 2rem; }
.modal-travaux { margin-bottom: 2rem; }
.modal-travaux h4 { font-family: var(--serif); font-size: 1.1rem; font-weight: 300; color: var(--cream); margin-bottom: 1rem; }
.travaux-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.travaux-item {
  font-size: 0.72rem; padding: 0.35rem 0.8rem;
  border: 0.5px solid rgba(201,168,76,0.25); color: var(--muted);

.modal-rdv-btn {
  display: block; width: 100%; background: var(--gold); color: var(--noir);
  border: none; padding: 1rem; font-size: 0.8rem; letter-spacing: 0.12em;
  text-transform: uppercase; cursor: pointer; font-weight: 500;
  font-family: var(--sans); text-align: center; text-decoration: none;
  transition: background 0.2s;
}
.modal-rdv-btn:hover { background: var(--gold-light); }

/* ── NO RESULTS ── */

@media (max-width: 900px) {
  nav { padding: 1rem 1.5rem; }
  .nav-links { display: none; }

  .projects-section { padding: 2rem 1.5rem; }
  .projects-grid { grid-template-columns: 1fr; }
  .modal-stats { grid-template-columns: 1fr 1fr; }
  .modal-slider-wrap { height: 260px; }

[dir="rtl"] .page-tag::before { display: none; }
[dir="rtl"] .page-tag::after { content:''; width:40px; height:0.5px; background:var(--gold); }
[dir="rtl"] .label-before { left:auto; right:12px; }
[dir="rtl"] .label-after { right:auto; left:12px; }
</style>

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => { if(b.textContent.toLowerCase()===lang) b.classList.add('active'); });
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const t = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(t[key]) el.innerHTML = t[key];
  });
  renderProjects();
}

function filterProjects(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderProjects();
}

function getFiltered() {
  if (currentFilter === 'all') return PROJECTS;
  return PROJECTS.filter(p => p.type === currentFilter || p.pays === currentFilter);
}

function renderProjects() {
  const t = i18n[currentLang];
  const filtered = getFiltered();
  const grid = document.getElementById('projectsGrid');
  const noRes = document.getElementById('noResults');

  if (filtered.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.map(p => {
    const title = p[`title_${currentLang}`];
    const location = p[`location_${currentLang}`];
    const desc = p[`desc_${currentLang}`];
    const beforeLabel = p[`before_label_${currentLang}`];
    const afterLabel = p[`after_label_${currentLang}`];
    return `
    <div class="project-card" onclick="openModal(${p.id})">
      <div class="slider-wrap" id="sw_${p.id}" data-id="${p.id}">
        <div class="slider-img img-before" style="background:${p.before_color};display:flex;align-items:center;justify-content:center;">
          <span style="font-size:3rem;opacity:0.3">🏚️</span>
        </div>
        <div class="slider-img img-after" id="after_${p.id}" style="background:${p.after_color};display:flex;align-items:center;justify-content:center;">
          <span style="font-size:3rem;opacity:0.5">✨</span>
        </div>
        <div class="slider-handle" id="handle_${p.id}" style="left:50%"></div>
        <div class="label-before">${beforeLabel}</div>
        <div class="label-after">${afterLabel}</div>
      </div>
      <div class="project-info">
        <div class="project-badges">
          <span class="badge type-${p.type}" data-i18n="filter_${p.type.substring(0,3)}">${p.type === 'residentiel' ? (t.filter_res||'Résidentiel') : p.type === 'commercial' ? (t.filter_com||'Commercial') : (t.filter_art||'Artistique')}</span>
          <span class="badge pays">${p.pays === 'DZ' ? '🇩🇿 Algérie' : '🇲🇦 Maroc'}</span>
        </div>
        <h3 class="project-title">${title}</h3>
        <p class="project-location">📍 ${location}</p>
        <div class="project-stats">
          <div class="pstat"><div class="pstat-val">${p.surface}</div><div class="pstat-label">${t.lbl_surface}</div></div>
          <div class="pstat"><div class="pstat-val">${p.duree}</div><div class="pstat-label">${t.lbl_duree}</div></div>
          <div class="pstat"><div class="pstat-val" style="color:#4CAF50">${p.valeur}</div><div class="pstat-label">${t.lbl_valeur}</div></div>
        </div>
        <p class="project-desc">${desc.substring(0,120)}...</p>
        <span class="project-cta">${t.see_detail} →</span>
      </div>
    </div>`;
  }).join('');

  // Init sliders
  setTimeout(() => {
    filtered.forEach(p => initSlider(p.id));
  }, 50);
}

function initSlider(id) {
  const wrap = document.getElementById(`sw_${id}`);
  const after = document.getElementById(`after_${id}`);
  const handle = document.getElementById(`handle_${id}`);
  if (!wrap || !after || !handle) return;

  let dragging = false;

  function setPos(pct) {
    pct = Math.max(5, Math.min(95, pct));
    handle.style.left = pct + '%';
    after.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
  }

  function getPos(e, rect) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return ((clientX - rect.left) / rect.width) * 100;
  }

  wrap.addEventListener('mousedown', e => { e.preventDefault(); dragging = true; setPos(getPos(e, wrap.getBoundingClientRect())); });
  wrap.addEventListener('touchstart', e => { dragging = true; setPos(getPos(e, wrap.getBoundingClientRect())); }, {passive:true});
  window.addEventListener('mousemove', e => { if(dragging) setPos(getPos(e, wrap.getBoundingClientRect())); });
  window.addEventListener('touchmove', e => { if(dragging) setPos(getPos(e, wrap.getBoundingClientRect())); }, {passive:true});
  window.addEventListener('mouseup', () => { dragging = false; });
  window.addEventListener('touchend', () => { dragging = false; });
}

        <div class="modal-stat"><div class="modal-stat-val" style="color:#4CAF50">${p.valeur}</div><div class="modal-stat-label">${t.lbl_valeur}</div></div>

      </div>
      <p class="modal-desc">${desc}</p>

  `;

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => initModalSlider(id), 50);
}

function initModalSlider(id) {
  const wrap = document.getElementById(`msw_${id}`);
  const after = document.getElementById(`mafter_${id}`);
  const handle = document.getElementById(`mhandle_${id}`);
  if (!wrap || !after || !handle) return;
  let dragging = false;
  function setPos(pct) {
    pct = Math.max(5, Math.min(95, pct));
    handle.style.left = pct + '%';
    after.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
  }
  function getPos(e, rect) {
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    return ((cx - rect.left) / rect.width) * 100;
  }
  wrap.addEventListener('mousedown', e => { e.preventDefault(); dragging = true; setPos(getPos(e, wrap.getBoundingClientRect())); });
  wrap.addEventListener('touchstart', e => { dragging = true; setPos(getPos(e, wrap.getBoundingClientRect())); }, {passive:true});
  window.addEventListener('mousemove', e => { if(dragging) setPos(getPos(e, wrap.getBoundingClientRect())); });
  window.addEventListener('touchmove', e => { if(dragging) setPos(getPos(e, wrap.getBoundingClientRect())); }, {passive:true});
  window.addEventListener('mouseup', () => dragging = false);

}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

renderProjects();
